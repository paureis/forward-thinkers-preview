<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Migration — Forward Thinkers Consulting</title>
<link rel="icon" href="assets/mark-teal.jpg">
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://cdn.jsdelivr.net/npm/lucide@0.292.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--white); -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--teal-50); }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--persian-green); outline-offset: 2px; border-radius: 4px; }
  .ft-mobile-toggle { display: none; }
  @media (max-width: 980px) {
    .ft-tackle-grid { grid-template-columns: 1fr 1fr !important; }
    .ft-steps-grid { grid-template-columns: 1fr !important; gap: var(--space-5) !important; }
    .ft-overview-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 1024px) {
    .ft-desktop-nav { display: none !important; }
    .ft-mobile-toggle { display: inline-flex !important; }
    .ft-footer-grid { grid-template-columns: 1fr 1fr !important; gap: var(--space-6) !important; }
  }
  @media (max-width: 560px) {
    .ft-tackle-grid { grid-template-columns: 1fr !important; }
    .ft-footer-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="service-cloud.jsx"></script>
<script type="text/babel">
  const { useEffect } = React;
  function App() {
    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
    return (
      <React.Fragment>
        <Header />
        <main>
          <ServiceHero />
          <ServiceOverview />
          <ServiceTackle />
          <ServiceApproach />
          <ServiceOutcomes />
          <RelatedCaseStudy />
          <ServiceCTA />
        </main>
        <Footer />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
