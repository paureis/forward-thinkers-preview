<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forward Thinkers Consulting — Homepage</title>
<link rel="icon" href="assets/mark-teal.jpg">
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://cdn.jsdelivr.net/npm/lucide@0.292.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--white); -webkit-font-smoothing: antialiased; }
  ::selection { background: var(--teal-50); }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--persian-green); outline-offset: 2px; border-radius: 4px; }
  .ft-mobile-toggle { display: none; }
  @media (max-width: 1024px) {
    .ft-desktop-nav { display: none !important; }
    .ft-mobile-toggle { display: inline-flex !important; }
    .ft-services-grid { grid-template-columns: 1fr 1fr !important; }
    .ft-flagship-grid { grid-template-columns: 1fr !important; }
    .ft-stats-grid { grid-template-columns: 1fr 1fr !important; }
    .ft-footer-grid { grid-template-columns: 1fr 1fr !important; gap: var(--space-6) !important; }
    .ft-hero-mark { display: none; }
    .ft-fstory-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 560px) {
    .ft-services-grid { grid-template-columns: 1fr !important; }
    .ft-stats-grid { grid-template-columns: 1fr 1fr !important; }
    .ft-footer-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="sections-top.jsx"></script>
<script type="text/babel" src="sections-mid.jsx"></script>
<script type="text/babel">
  const { useEffect } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "heroBackdrop": "white",
    "credStyle": "columns",
    "rhythm": "compact"
  }/*EDITMODE-END*/;

  const RHYTHM = {
    compact:  { "--space-8": "48px", "--space-9": "72px",  "--space-10": "96px"  },
    standard: { "--space-8": "64px", "--space-9": "96px",  "--space-10": "128px" },
    airy:     { "--space-8": "80px", "--space-9": "120px", "--space-10": "160px" },
  };

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
    useEffect(() => {
      const vars = RHYTHM[t.rhythm] || RHYTHM.standard;
      for (const [k, v] of Object.entries(vars)) document.documentElement.style.setProperty(k, v);
    }, [t.rhythm]);
    return (
      <React.Fragment>
        <Header />
        <main>
          <Hero credStyle={t.credStyle} backdrop={t.heroBackdrop} />
          <TrustBar />
          <ServicesGrid />
          <FeaturedStory />
          <Flagship />
          <Results />
          <CaseStudy />
          <CTA />
        </main>
        <Footer />
        <TweaksPanel>
          <TweakSection label="Hero" />
          <TweakRadio label="Backdrop" value={t.heroBackdrop}
            options={[{ value: "white", label: "White" }, { value: "tinted", label: "Tinted" }, { value: "navy", label: "Navy" }]}
            onChange={(v) => setTweak("heroBackdrop", v)} />
          <TweakRadio label="Credentials" value={t.credStyle}
            options={[{ value: "hairline", label: "Hairline" }, { value: "chips", label: "Chips" }, { value: "columns", label: "Columns" }]}
            onChange={(v) => setTweak("credStyle", v)} />
          <TweakSection label="Page" />
          <TweakRadio label="Rhythm" value={t.rhythm}
            options={[{ value: "compact", label: "Compact" }, { value: "standard", label: "Standard" }, { value: "airy", label: "Airy" }]}
            onChange={(v) => setTweak("rhythm", v)} />
        </TweaksPanel>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
